<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brighter Minds Lessons</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body { background:#f5f5f5; }
.card img { height:180px; object-fit:cover; }
</style>
</head>

<body>

<div id="app" class="container py-4">

<h2 class="text-primary">Brighter Minds</h2>

<!-- LESSONS -->
<div v-if="!showCart">
  <div class="row">
    <div class="col-md-4 mb-3" v-for="lesson in lessons" :key="lesson._id">
      <div class="card">
        <img :src="lesson.image">
        <div class="card-body">
          <h5>{{ lesson.subject }}</h5>
          <p>£{{ lesson.price }}</p>
          <p>Spaces: {{ lesson.spaces }}</p>

          <button class="btn btn-primary w-100"
            :disabled="lesson.spaces === 0"
            @click="addToCart(lesson)">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

  <button class="btn btn-warning mt-3" @click="showCart = true">
    Go to Cart ({{ cart.length }})
  </button>
</div>

<!-- CART -->
<div v-else>

<h3>Cart</h3>

<div v-for="item in cart" :key="item._id">
  {{ item.subject }} - £{{ item.price }}
</div>

<input v-model="name" class="form-control mb-2" placeholder="Name">
<input v-model="phone" class="form-control mb-2" placeholder="Phone">

<button class="btn btn-success w-100" @click="checkout">
  Checkout
</button>

<button class="btn btn-secondary w-100 mt-2" @click="showCart=false">
  Back
</button>

</div>

</div>

<script>
const API = "https://school-dkny.onrender.com";

Vue.createApp({
data() {
  return {
    lessons: [],
    cart: [],
    showCart: false,
    name: "",
    phone: ""
  };
},

mounted() {
  this.loadLessons();
},

methods: {

async loadLessons() {
  const res = await axios.get(API + "/lessons");
  this.lessons = res.data;
},

addToCart(lesson) {
  this.cart.push({...lesson, quantity: 1});
  lesson.spaces--;

  axios.patch(API + "/lessons/" + lesson._id + "/spaces", {
    change: -1
  });
},

async checkout() {
  try {
    const res = await axios.post(API + "/orders", {
      name: this.name,
      phone: this.phone,
      cart: this.cart
    });

    console.log("ORDER RESPONSE:", res.data);

    alert("Order saved successfully!");

    this.cart = [];
    this.name = "";
    this.phone = "";
    this.showCart = false;

    this.loadLessons();

  } catch (err) {
    console.error("ERROR:", err.response?.data || err);
    alert("Order failed ❌ Check console");
  }
}

}

}).mount("#app");
</script>

</body>
</html>
