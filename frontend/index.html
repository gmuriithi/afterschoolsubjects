<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brighter Minds Lessons</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Vue + Axios -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding-top: 20px;
    }
    header {
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
    }
    .lesson-card img {
      height: 180px;
      object-fit: cover;
    }
    .cart-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    .filters input {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
<div id="app" class="container">

  <!-- HEADER -->
  <header>
    <h1 class="text-primary">{{ sitename }}</h1>
    <button class="btn btn-warning" @click="showCart = !showCart">
      Cart ({{ cart.length }})
    </button>
  </header>

  <!-- LESSONS -->
  <section v-if="!showCart">
    <h2 class="mb-3">Available Lessons</h2>

    <!-- Filters -->
    <div class="row filters mb-4">
      <div class="col-md-6 mb-2">
        <input v-model="searchQuery" type="text" class="form-control"
          placeholder="Search by subject..." />
      </div>
      <div class="col-md-6 mb-2">
        <input v-model="locationQuery" type="text" class="form-control"
          placeholder="Filter by location..." />
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-4" v-for="lesson in filteredLessons" :key="lesson._id">
        <div class="card h-100 shadow-sm lesson-card">
          <img :src="lesson.image" class="card-img-top">
          <div class="card-body d-flex flex-column">
            <h5>{{ lesson.subject }}</h5>
            <p><strong>Location:</strong> {{ lesson.location }}</p>
            <p><strong>Price:</strong> £{{ lesson.price }}</p>
            <p><strong>Spaces:</strong> {{ lesson.spaces }}</p>

            <button class="btn btn-primary mt-auto"
              :disabled="lesson.spaces === 0"
              @click="addToCart(lesson)">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CART -->
  <section v-else>
    <h2>Your Cart</h2>

    <div class="cart-box mx-auto">
      <div v-for="item in cart" :key="item._id" class="d-flex justify-content-between mb-2">
        <span>{{ item.subject }} — £{{ item.price }}</span>
        <button class="btn btn-danger btn-sm" @click="removeFromCart(item)">
          Remove
        </button>
      </div>

      <hr>
      <h4>Total: £{{ cartTotal }}</h4>

      <!-- CHECKOUT -->
      <h5 class="mt-3">Checkout</h5>

      <input v-model="name" class="form-control mb-2" placeholder="Your Name">
      <input v-model="phone" class="form-control mb-3" placeholder="Phone Number">

      <button class="btn btn-success w-100"
        :disabled="cart.length === 0 || !validForm"
        @click="checkout">
        Confirm Order
      </button>
    </div>
  </section>

</div>

<script>
  const API_URL = "https://school-dkny.onrender.com";

new Vue({
  el: "#app",
  data: {
    sitename: "Brighter Minds",
    lessons: [],
    cart: [],
    showCart: false,
    name: "",
    phone: "",
    searchQuery: "",
    locationQuery: ""
  },

  computed: {
    cartTotal() {
      return this.cart.reduce((t, i) => t + i.price, 0);
    },
    validForm() {
      return this.name.trim() !== "" && /^[0-9]+$/.test(this.phone);
    },
    filteredLessons() {
      return this.lessons.filter(l => {
        const s = this.searchQuery.toLowerCase();
        const loc = this.locationQuery.toLowerCase();
        return (
          (!s || l.subject.toLowerCase().includes(s)) &&
          (!loc || l.location.toLowerCase().includes(loc))
        );
      });
    }
  },

  methods: {

    async loadLessons() {
      try {
        const res = await axios.get(`${API_URL}/lessons`);
        this.lessons = res.data;
      } catch (err) {
        console.error(err);
      }
    },

    async addToCart(lesson) {
      if (lesson.spaces === 0) return;
      this.cart.push(lesson);
      lesson.spaces--;

      await axios.patch(`${API_URL}/lessons/${lesson._id}/spaces`, {
        change: -1
      });
    },

    async removeFromCart(lesson) {
      const i = this.cart.indexOf(lesson);
      if (i !== -1) this.cart.splice(i, 1);

      lesson.spaces++;

      await axios.patch(`${API_URL}/lessons/${lesson._id}/spaces`, {
        change: 1
      });
    },

    // ✅ FIXED CHECKOUT (NOW SAVES TO DB)
    async checkout() {
      try {
        await axios.post(`${API_URL}/orders`, {
          name: this.name,
          phone: this.phone,
          cart: this.cart
        });

        alert(`✅ Order saved for ${this.name}`);

        this.cart = [];
        this.name = "";
        this.phone = "";
        this.showCart = false;

        this.loadLessons();

      } catch (err) {
        console.error(err);
        alert("❌ Error saving order");
      }
    }
  },

  created() {
    this.loadLessons();
  }
});
</script>

</body>
</html>
