<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brighter Minds Lessons</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding-top: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cart-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    .lesson-card img {
      height: 180px;
      object-fit: cover;
    }
  </style>
</head>

<body>
<div id="app" class="container">

  <!-- HEADER -->
  <header>
    <h2>{{ sitename }}</h2>
    <button class="btn btn-warning" @click="showCart = !showCart">
      Cart ({{ cart.length }})
    </button>
  </header>

  <!-- LESSONS -->
  <div v-if="!showCart">
    <div class="row">
      <div class="col-md-4 mb-3" v-for="lesson in lessons" :key="lesson._id">

        <div class="card lesson-card">
          <img :src="lesson.image" class="card-img-top">
          <div class="card-body">
            <h5>{{ lesson.subject }}</h5>
            <p>£{{ lesson.price }}</p>
            <p>Spaces: {{ lesson.spaces }}</p>

            <button class="btn btn-primary"
              :disabled="lesson.spaces === 0"
              @click="addToCart(lesson)">
              Add to Cart
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- CART -->
  <div v-else>
    <div class="cart-box">

      <div v-for="item in cart" :key="item._id" class="d-flex justify-content-between">
        <span>{{ item.subject }} - £{{ item.price }}</span>
        <button class="btn btn-danger btn-sm" @click="removeFromCart(item)">X</button>
      </div>

      <hr>
      <h4>Total: £{{ cartTotal }}</h4>

      <input v-model="name" class="form-control mb-2" placeholder="Name">
      <input v-model="phone" class="form-control mb-2" placeholder="Phone">

      <button class="btn btn-success w-100"
        :disabled="cart.length === 0 || !validForm"
        @click="checkout">
        Confirm Order
      </button>

    </div>
  </div>

</div>

<script>
const API_URL = "https://school-dkny.onrender.com";

new Vue({
  el: "#app",
  data: {
    sitename: "Brighter Minds",
    lessons: [],
    cart: [],
    showCart: false,
    name: "",
    phone: ""
  },

  computed: {
    cartTotal() {
      return this.cart.reduce((t, i) => t + i.price, 0);
    },
    validForm() {
      return this.name !== "" && /^[0-9]+$/.test(this.phone);
    }
  },

  methods: {

    async loadLessons() {
      const res = await axios.get(`${API_URL}/lessons`);
      this.lessons = res.data;
    },

    async addToCart(lesson) {
      this.cart.push(lesson);
      lesson.spaces--;

      await axios.patch(`${API_URL}/lessons/${lesson._id}/spaces`, {
        change: -1
      });
    },

    async removeFromCart(lesson) {
      const i = this.cart.indexOf(lesson);
      this.cart.splice(i, 1);

      lesson.spaces++;

      await axios.patch(`${API_URL}/lessons/${lesson._id}/spaces`, {
        change: 1
      });
    },

    // ✅ FINAL FIXED CHECKOUT
    async checkout() {
      try {

        const cleanCart = this.cart.map(i => ({
          _id: i._id,
          subject: i.subject,
          price: i.price
        }));

        const res = await axios.post(`${API_URL}/orders`, {
          name: this.name,
          phone: this.phone,
          cart: cleanCart
        });

        alert("Order saved successfully ✅");

        this.cart = [];
        this.name = "";
        this.phone = "";
        this.showCart = false;

        this.loadLessons();

      } catch (err) {
        console.error(err);
        alert("Order failed ❌");
      }
    }

  },

  created() {
    this.loadLessons();
  }
});
</script>

</body>
</html>
