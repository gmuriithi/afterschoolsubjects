<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>After School Lessons</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
body { background:#f5f5f5; }
.card img { height:180px; object-fit:cover; }
</style>
</head>

<body>

<div id="app" class="container py-4">

<h2 class="text-primary">After School Lessons</h2>

<button class="btn btn-dark mb-3" @click="toggleCart">
Cart ({{ cart.length }})
</button>

<!-- LESSONS -->
<div v-if="!showCart" class="row">
  <div class="col-md-4 mb-3" v-for="lesson in lessons" :key="lesson._id">
    <div class="card">
      <img :src="lesson.image">
      <div class="card-body">
        <h5>{{ lesson.subject }}</h5>
        <p>{{ lesson.location }}</p>
        <p>£{{ lesson.price }}</p>
        <p>Spaces: {{ lesson.spaces }}</p>

        <button class="btn btn-primary"
          :disabled="lesson.spaces === 0"
          @click="addToCart(lesson)">
          Add to Cart
        </button>
      </div>
    </div>
  </div>
</div>

<!-- CART -->
<div v-else>
  <h3>Cart</h3>

  <div v-for="item in cart" :key="item._id">
    {{ item.subject }} - £{{ item.price }}
    <button class="btn btn-sm btn-danger" @click="remove(item)">X</button>
  </div>

  <hr>

  <input v-model="name" class="form-control mb-2" placeholder="Name">
  <input v-model="phone" class="form-control mb-2" placeholder="Phone">

  <button class="btn btn-success w-100" @click="checkout">
    Checkout
  </button>
</div>

</div>

<script>
const API = "https://school-dkny.onrender.com";

Vue.createApp({
data() {
  return {
    lessons: [],
    cart: [],
    showCart: false,
    name: "",
    phone: ""
  };
},

methods: {

async loadLessons() {
  const res = await fetch(API + "/lessons");
  this.lessons = await res.json();
},

toggleCart() {
  this.showCart = !this.showCart;
},

addToCart(lesson) {
  this.cart.push({ ...lesson, quantity: 1 });
  lesson.spaces--;
},

remove(item) {
  this.cart = this.cart.filter(i => i._id !== item._id);
},

async checkout() {
  try {
    const res = await fetch(API + "/orders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: this.name,
        phone: this.phone,
        cart: this.cart
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    alert("✅ Order saved successfully!");

    this.cart = [];
    this.name = "";
    this.phone = "";
    this.showCart = false;

    this.loadLessons();

  } catch (err) {
    console.error(err);
    alert("❌ Order failed");
  }
}

},

mounted() {
  this.loadLessons();
}

}).mount("#app");
</script>

</body>
</html>
