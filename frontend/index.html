<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brighter Minds</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

<div id="app" class="container py-4">

<h2>Brighter Minds</h2>

<div v-if="!showCart">
  <div v-for="l in lessons" :key="l._id">
    <p>{{ l.subject }} - £{{ l.price }}</p>
    <button @click="addToCart(l)">Add</button>
  </div>

  <button @click="showCart=true">Cart ({{ cart.length }})</button>
</div>

<div v-else>

<h3>Cart</h3>

<div v-for="c in cart" :key="c._id">
  {{ c.subject }} - £{{ c.price }}
</div>

<input v-model="name" placeholder="Name" class="form-control">
<input v-model="phone" placeholder="Phone" class="form-control">

<button class="btn btn-success w-100" @click="checkout">
Checkout
</button>

<button class="btn btn-secondary w-100 mt-2" @click="showCart=false">
Back
</button>

</div>

</div>

<script>
const API = "https://school-dkny.onrender.com";

Vue.createApp({
data() {
  return {
    lessons: [],
    cart: [],
    showCart: false,
    name: "",
    phone: ""
  }
},

mounted() {
  this.load();
},

methods: {

async load() {
  const res = await axios.get(API + "/lessons");
  this.lessons = res.data;
},

addToCart(l) {
  this.cart.push(l);
},

async checkout() {
  try {
    console.log("SENDING:", {
      name: this.name,
      phone: this.phone,
      cart: this.cart
    });

    const res = await axios.post(API + "/orders", {
      name: this.name,
      phone: this.phone,
      cart: this.cart
    });

    console.log("SUCCESS:", res.data);

    alert("Order saved!");

    this.cart = [];
    this.name = "";
    this.phone = "";
    this.showCart = false;

  } catch (err) {
    console.log("FULL ERROR:", err.response?.data || err);
    alert("Order failed ❌ Check console");
  }
}

}

}).mount("#app");
</script>

</body>
</html>
